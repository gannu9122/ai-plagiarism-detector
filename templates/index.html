<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Plagiarism Detector</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .title {
            font-weight: bold;
            color: #0d6efd;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        #drop-area {
            cursor: pointer;
            transition: .3s;
        }

        #drop-area.dragover {
            background: #e8f5e9;
            border-color: #198754 !important;
        }

        #file-list {
            margin-top: 15px;
            font-weight: 500;
        }
    </style>

</head>

<body>

<div class="container mt-5">

    <!-- Heading -->
    <div class="card shadow p-4 mb-4">

        <h1 class="text-center title">
            🤖 AI Plagiarism Detector
        </h1>

        <p class="text-center text-muted">
            Upload multiple PDF assignments and compare similarity instantly.
        </p>

    </div>

    <!-- Upload Card -->
    <div class="card shadow p-4">

        <h4 class="mb-3">
            📂 Upload PDF Assignments
        </h4>

        <form action="/compare" method="POST" enctype="multipart/form-data">

            <div class="mb-3">

                <div id="drop-area"
                    class="border border-2 border-primary rounded p-5 text-center bg-light">

                    <h4>📂 Drag & Drop PDF Files Here</h4>

                    <p>OR</p>

                    <label for="pdf_files" class="btn btn-primary">
                        Browse Files
                    </label>

                    <div id="file-list" class="text-success mt-3"></div>

                </div>

                <input
                    id="pdf_files"
                    type="file"
                    class="d-none"
                    name="pdf_files"
                    multiple
                    accept=".pdf"
                    required>

            </div>

            <!-- Compare Button -->
            <button
                type="submit"
                class="btn btn-primary w-100">
                Compare PDFs
            </button>

            <!-- Loading Spinner -->
            <div id="loading"
                class="text-center mt-3"
                style="display:none;">

                <div class="spinner-border text-primary"></div>

                <p class="mt-2">
                    Comparing PDFs...
                </p>

            </div>

        </form>

    </div>

</div>

<!-- JavaScript -->
<script>

const form = document.querySelector("form");
const loading = document.getElementById("loading");

const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("pdf_files");
const fileList = document.getElementById("file-list");

// Browse Files
fileInput.addEventListener("change", showFiles);

// Drag Over
dropArea.addEventListener("dragover", function(e) {
    e.preventDefault();
    dropArea.classList.add("dragover");
});

// Drag Leave
dropArea.addEventListener("dragleave", function() {
    dropArea.classList.remove("dragover");
});

// Drop Files
dropArea.addEventListener("drop", function(e) {

    e.preventDefault();

    dropArea.classList.remove("dragover");

    fileInput.files = e.dataTransfer.files;

    showFiles();

});

// Show Selected Files
function showFiles() {

    fileList.innerHTML = "";

    for (let i = 0; i < fileInput.files.length; i++) {

        fileList.innerHTML += "📄 " + fileInput.files[i].name + "<br>";

    }

}

// Show Loading Spinner
form.addEventListener("submit", function() {

    loading.style.display = "block";

});

</script>

</body>
</html>
